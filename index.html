<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Ale 🛍️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#080e1e;color:white;margin:0}
.screen{display:none;padding:20px}
.screen.active{display:block}
.btn{padding:12px;border:none;border-radius:10px;margin-top:10px;cursor:pointer;width:100%}
.btn-green{background:#00e676;color:black}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#111}
.nav button{background:none;color:white;border:none;padding:10px}
</style>
</head>

<body>

<header style="padding:10px;background:#111">🛍️ Baby Ale</header>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h2>Login</h2>
  <input id="lEmail" placeholder="Correo"><br>
  <input id="lPass" type="password" placeholder="Contraseña"><br>
  <button class="btn btn-green" onclick="loginEmail()">Entrar</button>
  <button class="btn" onclick="show('home')">Entrar sin cuenta</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
  <h2>Inicio</h2>
  <button class="btn" onclick="show('shop')">Tienda</button>
  <button class="btn" onclick="show('cart')">Carrito</button>
  <button class="btn" onclick="show('profile')">Perfil</button>
</div>

<!-- TIENDA -->
<div id="shop" class="screen">
  <h2>Tienda</h2>
  <button class="btn" onclick="addToCart('Producto 1',100)">Agregar producto</button>
</div>

<!-- CARRITO -->
<div id="cart" class="screen">
  <h2>Carrito</h2>
  <div id="cartItems"></div>
  <button class="btn btn-green" onclick="buy()">Comprar</button>
  <button class="btn" onclick="clearCart()">Vaciar</button>
</div>

<!-- PERFIL -->
<div id="profile" class="screen">
  <h2>Perfil</h2>
  <button class="btn" onclick="logout()">Cerrar sesión</button>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('shop')">🛒</button>
  <button onclick="show('cart')">🧺</button>
  <button onclick="show('profile')">👤</button>
</div>

<script>
// 🔥 NAVEGACIÓN
function show(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(screen).classList.add('active')
}

// 🔥 LOGIN
function loginEmail(){
  let email = document.getElementById('lEmail').value
  let pass = document.getElementById('lPass').value

  if(!email || !pass){
    alert("Llena todo")
    return
  }

  alert("Login simulado")
  show('home')
}

// 🔥 REGISTER
function register(){
  alert("Registro simulado")
}

// 🔥 CARRITO
let cart = []

function addToCart(name,price){
  cart.push({name,price})
  renderCart()
  alert("Agregado")
}

function renderCart(){
  let box = document.getElementById('cartItems')
  box.innerHTML = ""

  if(cart.length==0){
    box.innerHTML="Vacío"
    return
  }

  cart.forEach(p=>{
    box.innerHTML += `<p>${p.name} - $${p.price}</p>`
  })
}

function clearCart(){
  cart=[]
  renderCart()
}

function buy(){
  if(cart.length==0){
    alert("Carrito vacío")
    return
  }
  alert("Compra hecha (fake)")
  cart=[]
  renderCart()
}

// 🔥 KEY
function useKey(){
  alert("Key usada (fake)")
}

// 🔥 ADMIN
function addProduct(){alert("Producto agregado")}
function createKey(){alert("Key creada")}

// 🔥 PERFIL
function logout(){
  show('login')
}

</script>

</body>
</html>

<script type="module">

// =======================
// 🔥 FIREBASE
// =======================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, doc, setDoc, getDoc, updateDoc,
  collection, getDocs, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ⚠️ CONFIGURA ESTO
const firebaseConfig = {
  apiKey: "TU_API",
  authDomain: "TU_DOMINIO",
  projectId: "TU_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// =======================
// 🔐 ESTADO GLOBAL
// =======================
let currentUser = null;
let isAdmin = false;
let cart = [];

// ADMIN
const ADMIN_EMAIL = "Panchito@gmail.com";

// =======================
// 🌎 MONEDA AUTOMÁTICA
// =======================
async function detectCurrency(){
  try{
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();

    const map = {
      MX:"MXN",
      US:"USD",
      PE:"PEN",
      DO:"DOP"
    };

    return map[data.country_code] || "USD";
  }catch{
    return "USD";
  }
}

let currency = "USD";

// =======================
// 🔐 AUTH
// =======================
window.loginEmail = async () => {
  let email = lEmail.value;
  let pass = lPass.value;

  let cred = await signInWithEmailAndPassword(auth,email,pass);
  loadUser(cred.user);
};

window.register = async () => {
  let cred = await createUserWithEmailAndPassword(auth,rEmail.value,rPass.value);

  await setDoc(doc(db,"users",cred.user.uid),{
    name:rName.value,
    email:rEmail.value,
    saldo:0
  });

  loadUser(cred.user);
};

window.loginGoogle = async () => {
  let result = await signInWithPopup(auth,provider);
  let user = result.user;

  let ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      name:user.displayName,
      email:user.email,
      saldo:0
    });
  }

  loadUser(user);
};

// =======================
// 👤 CARGAR USUARIO
// =======================
async function loadUser(user){
  currentUser = user;
  isAdmin = user.email === ADMIN_EMAIL;

  currency = await detectCurrency();

  let snap = await getDoc(doc(db,"users",user.uid));
  let data = snap.data();

  saldoAmt.textContent = currency+" "+data.saldo;
  welcomeName.textContent = "👋 "+data.name;

  profileNameTxt.textContent = data.name;
  profileEmailTxt.textContent = data.email;
  profileSaldo.textContent = currency+" "+data.saldo;

  show("home");

  loadProducts();

  if(isAdmin) loadAdmin();
}

// =======================
// 🛍️ PRODUCTOS DESDE GITHUB
// =======================
async function loadProducts(){
  let container = document.getElementById("products");

  try{
    let res = await fetch("https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/products.json");
    let products = await res.json();

    renderProducts(products);

  }catch{
    container.innerHTML = "Error cargando productos";
  }
}

function renderProducts(products){
  let container = document.getElementById("products");
  container.innerHTML = `<div class="products-grid"></div>`;
  let grid = container.querySelector(".products-grid");

  products.forEach(p=>{
    grid.innerHTML += `
    <div class="product-card">
      <img class="prod-img" src="${p.img}">
      <div class="prod-body">
        <div class="prod-name">${p.name}</div>
        <div class="prod-price">${currency} ${p.price}</div>
        <button class="btn btn-green" onclick="addToCart('${p.name}',${p.price})">Comprar</button>
      </div>
    </div>`;
  });
}

// =======================
// 🛒 CARRITO
// =======================
window.addToCart = (name,price)=>{
  cart.push({name,price});
  renderCart();
};

function renderCart(){
  let box = cartItems;
  let total = 0;

  box.innerHTML = "";

  cart.forEach(p=>{
    total+=p.price;
    box.innerHTML += `<div class="cart-item">${p.name} - ${currency} ${p.price}</div>`;
  });

  cartTotalVal.textContent = currency+" "+total;
}

// =======================
// 💳 PAGOS (BASE)
// =======================
window.pay = (method)=>{
  alert("Pago con "+method+" (conectar API real)");
};

// =======================
// 👑 ADMIN
// =======================
async function loadAdmin(){
  let usersDiv = adminUsers;
  usersDiv.innerHTML = "";

  let snap = await getDocs(collection(db,"users"));

  snap.forEach(docu=>{
    let u = docu.data();

    usersDiv.innerHTML += `
    <div class="user-row">
      <div>${u.name}</div>
      <div>${currency} ${u.saldo}</div>
      <button onclick="addSaldo('${docu.id}')">💰</button>
    </div>`;
  });
}

// 💰 SALDO
window.addSaldo = async (uid)=>{
  let amount = prompt("Cantidad:");
  if(!amount) return;

  let ref = doc(db,"users",uid);
  let snap = await getDoc(ref);
  let data = snap.data();

  await updateDoc(ref,{
    saldo: data.saldo + Number(amount)
  });

  loadAdmin();
};

// =======================
// 🚪 LOGOUT
// =======================
window.logout = ()=> signOut(auth);

// =======================
// 🔄 AUTO LOGIN
// =======================
onAuthStateChanged(auth,user=>{
  if(user) loadUser(user);
  else show("login");
});

// =======================
// 📱 UI
// =======================
window.show = (id)=>{
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

        </script>
